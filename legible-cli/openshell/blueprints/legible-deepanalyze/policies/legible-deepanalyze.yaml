# Legible DeepAnalyze Agent Network Policy
#
# NemoClaw-compatible network policy for the DeepAnalyze data science sandbox.
# Allows Legible platform access, model API endpoints, and PyPI for packages.

version: 1

network_policies:
  legible_mcp:
    name: legible_mcp
    description: "Access to Legible MCP server (semantic layer)"
    endpoints:
      - host: host.docker.internal
        port: 9000
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/mcp/**" }
          - allow: { method: POST, path: "/mcp/**" }
          - allow: { method: GET, path: "/sse" }
          - allow: { method: POST, path: "/messages" }
    binaries:
      - { path: /usr/local/bin/legible }
      - { path: /usr/local/bin/node }

  legible_ui:
    name: legible_ui
    description: "Access to Legible UI API (GraphQL)"
    endpoints:
      - host: host.docker.internal
        port: 3000
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/api/graphql" }
          - allow: { method: POST, path: "/api/graphql" }
    binaries:
      - { path: /usr/local/bin/legible }

  vllm_local:
    name: vllm_local
    description: "Local vLLM model server"
    endpoints:
      - host: localhost
        port: 8000
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: POST, path: "/v1/completions" }
          - allow: { method: POST, path: "/v1/chat/completions" }
          - allow: { method: GET, path: "/v1/models" }
    binaries:
      - { path: /usr/bin/python3 }
      - { path: /usr/local/bin/python3 }

  deepanalyze_backend:
    name: deepanalyze_backend
    description: "DeepAnalyze backend API and file service (internal)"
    endpoints:
      - host: localhost
        port: 8200
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: "*", path: "/**" }
      - host: localhost
        port: 8100
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: "*", path: "/**" }
    binaries:
      - { path: /usr/bin/python3 }
      - { path: /usr/local/bin/node }

  model_apis:
    name: model_apis
    description: "External LLM API providers (OpenAI, Anthropic, NVIDIA, HeyWhale)"
    endpoints:
      - host: api.openai.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: POST, path: "/v1/**" }
      - host: api.anthropic.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: POST, path: "/v1/**" }
      - host: integrate.api.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: POST, path: "/v1/**" }
      - host: api.heywhale.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: POST, path: "/v1/**" }
    binaries:
      - { path: /usr/bin/python3 }
      - { path: /usr/local/bin/python3 }

  pypi:
    name: pypi
    description: "Python package index for installing analysis dependencies"
    endpoints:
      - host: pypi.org
        port: 443
        protocol: rest
        enforcement: enforce
      - host: files.pythonhosted.org
        port: 443
        protocol: rest
        enforcement: enforce
    binaries:
      - { path: /usr/bin/pip3 }
      - { path: /usr/local/bin/pip3 }

  npm_registry:
    name: npm_registry
    description: "npm registry for frontend dependencies"
    endpoints:
      - host: registry.npmjs.org
        port: 443
        protocol: rest
        enforcement: enforce
    binaries:
      - { path: /usr/local/bin/npm }
      - { path: /usr/local/bin/node }

  huggingface:
    name: huggingface
    description: "Hugging Face model downloads"
    endpoints:
      - host: huggingface.co
        port: 443
        protocol: rest
        enforcement: enforce
      - host: "*.huggingface.co"
        port: 443
        protocol: rest
        enforcement: enforce
    binaries:
      - { path: /usr/bin/python3 }
      - { path: /usr/local/bin/python3 }
