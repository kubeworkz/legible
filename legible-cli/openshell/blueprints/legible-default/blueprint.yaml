# Legible Agent Blueprint — Default
#
# A NemoClaw-compatible blueprint for running AI agents in OpenShell
# sandboxes with access to the Legible semantic layer via MCP.
#
# Usage:
#   legible blueprint apply legible-default
#   legible agent create my-agent --blueprint legible-default

version: "0.1.0"
min_openshell_version: "0.1.0"
description: |
  Default Legible agent blueprint. Provides a sandboxed AI coding agent
  with MCP access to your Legible project's semantic layer, pre-configured
  network policies, and inference routing.

supported_connectors:
  - POSTGRES
  - BIG_QUERY
  - SNOWFLAKE
  - MYSQL
  - ORACLE
  - MSSQL
  - CLICK_HOUSE
  - TRINO
  - DUCKDB
  - ATHENA
  - REDSHIFT
  - DATABRICKS

components:
  sandbox:
    image: "legible-sandbox:latest"
    build:
      dockerfile: "../../Dockerfile"
    name: "legible-agent"
    forward_ports:
      - 9000

  inference:
    profiles:
      nvidia:
        provider_type: "nvidia"
        provider_name: "nvidia-inference"
        endpoint: "https://integrate.api.nvidia.com/v1"
        model: "nvidia/nemotron-3-super-120b-a12b"
      openai:
        provider_type: "openai"
        provider_name: "openai-inference"
        endpoint: "https://api.openai.com/v1"
        model: "gpt-4o"
      anthropic:
        provider_type: "anthropic"
        provider_name: "anthropic-inference"
        endpoint: "https://api.anthropic.com/v1"
        model: "claude-sonnet-4-20250514"
      local:
        provider_type: "ollama"
        provider_name: "local-inference"
        endpoint: "http://host.docker.internal:11434/v1"
        model: "llama3.1:8b"

  mcp:
    servers:
      legible:
        transport: "streamable-http"
        url: "http://host.docker.internal:9000/mcp"

policies:
  network: "policies/legible-sandbox.yaml"
  filesystem:
    read_only:
      - /usr
      - /lib
      - /proc
      - /app
      - /etc
    read_write:
      - /home/sandbox
      - /workspace
      - /tmp
  process:
    deny_privilege_escalation: true
    run_as_user: sandbox
    run_as_group: sandbox

agent:
  type: "claude"
  allowed_types:
    - claude
    - codex
    - opencode
    - copilot
  entrypoint: "/usr/local/bin/sandbox-entrypoint.sh"
