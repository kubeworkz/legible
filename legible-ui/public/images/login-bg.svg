<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Cool blue-gray background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f6fb"/>
      <stop offset="100%" stop-color="#e6eef5"/>
    </linearGradient>

    <!-- Radial wash toward center — brightens where the login card sits -->
    <radialGradient id="center-wash" cx="50%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#eaf8f8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#eaf8f8" stop-opacity="0"/>
    </radialGradient>

    <!-- Teal dot grid — subtle data-field texture -->
    <pattern id="dotgrid" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="1.4" fill="#13c2c2" opacity="0.11"/>
    </pattern>
  </defs>

  <!-- ── Base layers ── -->
  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect width="1440" height="900" fill="url(#dotgrid)"/>
  <rect width="1440" height="900" fill="url(#center-wash)"/>

  <!--
    ================================================================
    SEMANTIC GRAPH NETWORK
    Nodes + connections distributed at the edges/corners so they
    frame the centered login card without competing with it.
    All elements use teal (#13c2c2) at very low opacity.
    Citrus (#f58433) marks a single accent node per cluster.
    ================================================================
  -->

  <!-- ── Long-range spine lines between clusters (very faint, dashed) ── -->
  <g stroke="#13c2c2" fill="none" stroke-dasharray="5 9">
    <line x1="185" y1="140" x2="118" y2="390" stroke-opacity="0.07"/>
    <line x1="118" y1="390" x2="155" y2="720" stroke-opacity="0.07"/>
    <line x1="1280" y1="130" x2="1330" y2="415" stroke-opacity="0.07"/>
    <line x1="1330" y1="415" x2="1305" y2="800" stroke-opacity="0.07"/>
    <line x1="185"  y1="140" x2="1280" y2="130" stroke-opacity="0.04"/>
    <line x1="155"  y1="720" x2="1305" y2="800" stroke-opacity="0.04"/>
  </g>

  <!-- ── Data-flow curves: cluster hubs sweeping toward center ── -->
  <g stroke="#13c2c2" fill="none" stroke-dasharray="3 11" stroke-opacity="0.06">
    <path d="M 185 140 C 340 255, 498 362, 578 432"/>
    <path d="M 1280 130 C 1118 248, 958 358, 868 432"/>
    <path d="M 155 720 C 312 636, 472 554, 572 490"/>
    <path d="M 1305 800 C 1148 710, 990 620, 878 490"/>
  </g>

  <!-- ═══════════════════════════════════════════════
       TOP-LEFT CLUSTER
       Hub: (185, 140) — knowledge graph root
  ═══════════════════════════════════════════════ -->
  <g stroke="#13c2c2" fill="none">
    <line x1="100" y1="72"  x2="185" y2="140" stroke-opacity="0.13"/>
    <line x1="170" y1="45"  x2="185" y2="140" stroke-opacity="0.11"/>
    <line x1="245" y1="82"  x2="185" y2="140" stroke-opacity="0.11"/>
    <line x1="185" y1="140" x2="130" y2="168" stroke-opacity="0.13"/>
    <line x1="100" y1="72"  x2="130" y2="168" stroke-opacity="0.08"/>
    <line x1="245" y1="82"  x2="302" y2="140" stroke-opacity="0.09"/>
  </g>
  <!-- Hexagonal node — represents a database table -->
  <polygon points="185,99 194.53,104.5 194.53,115.5 185,121 175.47,115.5 175.47,104.5"
           fill="none" stroke="#13c2c2" stroke-width="1.5" opacity="0.22"/>
  <g fill="#13c2c2">
    <circle cx="100" cy="72"  r="4"   opacity="0.19"/>
    <circle cx="170" cy="45"  r="3"   opacity="0.14"/>
    <circle cx="245" cy="82"  r="4.5" opacity="0.17"/>
    <circle cx="185" cy="140" r="8.5" opacity="0.23"/>
    <circle cx="130" cy="168" r="4"   opacity="0.17"/>
    <circle cx="302" cy="140" r="3"   opacity="0.13"/>
  </g>
  <!-- Citrus accent node -->
  <circle cx="245" cy="82" r="3.5" fill="none" stroke="#f58433" stroke-width="1.2" opacity="0.28"/>

  <!-- ═══════════════════════════════════════════════
       TOP-RIGHT CLUSTER
       Hub: (1280, 130)
  ═══════════════════════════════════════════════ -->
  <g stroke="#13c2c2" fill="none">
    <line x1="1345" y1="52"  x2="1280" y2="130" stroke-opacity="0.11"/>
    <line x1="1415" y1="88"  x2="1280" y2="130" stroke-opacity="0.10"/>
    <line x1="1380" y1="168" x2="1280" y2="130" stroke-opacity="0.13"/>
    <line x1="1280" y1="130" x2="1175" y2="125" stroke-opacity="0.10"/>
    <line x1="1380" y1="168" x2="1312" y2="202" stroke-opacity="0.09"/>
    <line x1="1345" y1="52"  x2="1415" y2="88"  stroke-opacity="0.09"/>
  </g>
  <!-- Hexagonal node -->
  <polygon points="1280,89 1289.53,94.5 1289.53,105.5 1280,111 1270.47,105.5 1270.47,94.5"
           fill="none" stroke="#13c2c2" stroke-width="1.5" opacity="0.22"/>
  <g fill="#13c2c2">
    <circle cx="1345" cy="52"  r="4"   opacity="0.17"/>
    <circle cx="1415" cy="88"  r="3"   opacity="0.13"/>
    <circle cx="1380" cy="168" r="4.5" opacity="0.17"/>
    <circle cx="1280" cy="130" r="8.5" opacity="0.23"/>
    <circle cx="1175" cy="125" r="4"   opacity="0.16"/>
    <circle cx="1312" cy="202" r="3"   opacity="0.12"/>
  </g>
  <circle cx="1380" cy="168" r="3.5" fill="none" stroke="#f58433" stroke-width="1.2" opacity="0.28"/>

  <!-- ═══════════════════════════════════════════════
       MID-LEFT CLUSTER
       Hub: (118, 390)
  ═══════════════════════════════════════════════ -->
  <g stroke="#13c2c2" fill="none">
    <line x1="52"  y1="355" x2="118" y2="390" stroke-opacity="0.13"/>
    <line x1="118" y1="390" x2="70"  y2="448" stroke-opacity="0.13"/>
    <line x1="118" y1="390" x2="152" y2="460" stroke-opacity="0.11"/>
    <line x1="52"  y1="355" x2="70"  y2="448" stroke-opacity="0.08"/>
    <line x1="118" y1="390" x2="168" y2="345" stroke-opacity="0.09"/>
  </g>
  <!-- Hexagonal node -->
  <polygon points="118,351 127.53,356.5 127.53,367.5 118,373 108.47,367.5 108.47,356.5"
           fill="none" stroke="#13c2c2" stroke-width="1.5" opacity="0.22"/>
  <g fill="#13c2c2">
    <circle cx="52"  cy="355" r="3.5" opacity="0.16"/>
    <circle cx="118" cy="390" r="7.5" opacity="0.22"/>
    <circle cx="70"  cy="448" r="3"   opacity="0.14"/>
    <circle cx="152" cy="460" r="4"   opacity="0.17"/>
    <circle cx="168" cy="345" r="3"   opacity="0.13"/>
  </g>
  <circle cx="52" cy="355" r="3" fill="none" stroke="#f58433" stroke-width="1.2" opacity="0.25"/>

  <!-- ═══════════════════════════════════════════════
       MID-RIGHT CLUSTER
       Hub: (1330, 415)
  ═══════════════════════════════════════════════ -->
  <g stroke="#13c2c2" fill="none">
    <line x1="1395" y1="368" x2="1330" y2="415" stroke-opacity="0.12"/>
    <line x1="1330" y1="415" x2="1392" y2="465" stroke-opacity="0.12"/>
    <line x1="1330" y1="415" x2="1304" y2="488" stroke-opacity="0.11"/>
    <line x1="1392" y1="465" x2="1304" y2="488" stroke-opacity="0.08"/>
    <line x1="1278" y1="375" x2="1330" y2="415" stroke-opacity="0.09"/>
  </g>
  <polygon points="1330,374 1339.53,379.5 1339.53,390.5 1330,396 1320.47,390.5 1320.47,379.5"
           fill="none" stroke="#13c2c2" stroke-width="1.5" opacity="0.22"/>
  <g fill="#13c2c2">
    <circle cx="1395" cy="368" r="3.5" opacity="0.15"/>
    <circle cx="1330" cy="415" r="7.5" opacity="0.22"/>
    <circle cx="1392" cy="465" r="4"   opacity="0.17"/>
    <circle cx="1304" cy="488" r="3.5" opacity="0.15"/>
    <circle cx="1278" cy="375" r="3"   opacity="0.13"/>
  </g>
  <circle cx="1392" cy="465" r="3" fill="none" stroke="#f58433" stroke-width="1.2" opacity="0.25"/>

  <!-- ═══════════════════════════════════════════════
       BOTTOM-LEFT CLUSTER
       Hub: (155, 720)
  ═══════════════════════════════════════════════ -->
  <g stroke="#13c2c2" fill="none">
    <line x1="80"  y1="762" x2="155" y2="720" stroke-opacity="0.13"/>
    <line x1="155" y1="720" x2="218" y2="788" stroke-opacity="0.13"/>
    <line x1="155" y1="720" x2="140" y2="848" stroke-opacity="0.10"/>
    <line x1="80"  y1="762" x2="140" y2="848" stroke-opacity="0.08"/>
    <line x1="218" y1="788" x2="272" y2="752" stroke-opacity="0.10"/>
    <line x1="155" y1="720" x2="272" y2="752" stroke-opacity="0.09"/>
  </g>
  <polygon points="155,679 164.53,684.5 164.53,695.5 155,701 145.47,695.5 145.47,684.5"
           fill="none" stroke="#13c2c2" stroke-width="1.5" opacity="0.22"/>
  <g fill="#13c2c2">
    <circle cx="80"  cy="762" r="4"   opacity="0.17"/>
    <circle cx="155" cy="720" r="8.5" opacity="0.23"/>
    <circle cx="218" cy="788" r="4"   opacity="0.17"/>
    <circle cx="140" cy="848" r="3"   opacity="0.13"/>
    <circle cx="272" cy="752" r="4.5" opacity="0.18"/>
  </g>
  <circle cx="218" cy="788" r="3.5" fill="none" stroke="#f58433" stroke-width="1.2" opacity="0.28"/>

  <!-- ═══════════════════════════════════════════════
       BOTTOM-RIGHT CLUSTER
       Hub: (1305, 800)
  ═══════════════════════════════════════════════ -->
  <g stroke="#13c2c2" fill="none">
    <line x1="1375" y1="752" x2="1305" y2="800" stroke-opacity="0.13"/>
    <line x1="1305" y1="800" x2="1392" y2="848" stroke-opacity="0.12"/>
    <line x1="1305" y1="800" x2="1248" y2="775" stroke-opacity="0.11"/>
    <line x1="1248" y1="775" x2="1228" y2="848" stroke-opacity="0.09"/>
    <line x1="1305" y1="800" x2="1325" y2="878" stroke-opacity="0.10"/>
    <line x1="1375" y1="752" x2="1248" y2="775" stroke-opacity="0.08"/>
  </g>
  <!-- Hexagonal node -->
  <polygon points="1305,751 1314.53,756.5 1314.53,767.5 1305,773 1295.47,767.5 1295.47,756.5"
           fill="none" stroke="#13c2c2" stroke-width="1.5" opacity="0.22"/>
  <g fill="#13c2c2">
    <circle cx="1375" cy="752" r="4"   opacity="0.17"/>
    <circle cx="1305" cy="800" r="8.5" opacity="0.23"/>
    <circle cx="1392" cy="848" r="3"   opacity="0.13"/>
    <circle cx="1248" cy="775" r="4.5" opacity="0.18"/>
    <circle cx="1228" cy="848" r="3"   opacity="0.13"/>
    <circle cx="1325" cy="878" r="4"   opacity="0.16"/>
  </g>
  <circle cx="1375" cy="752" r="3.5" fill="none" stroke="#f58433" stroke-width="1.2" opacity="0.28"/>

  <!-- ── Ambient scattered nodes: fills in the data-field between clusters ── -->
  <g fill="#13c2c2" opacity="0.09">
    <!-- top edge -->
    <circle cx="390"  cy="38"  r="2"/>
    <circle cx="520"  cy="65"  r="1.5"/>
    <circle cx="680"  cy="28"  r="2.5"/>
    <circle cx="760"  cy="52"  r="1.5"/>
    <circle cx="900"  cy="35"  r="2"/>
    <circle cx="1048" cy="60"  r="1.5"/>
    <circle cx="1148" cy="40"  r="2"/>
    <!-- bottom edge -->
    <circle cx="382"  cy="858" r="2"/>
    <circle cx="542"  cy="838" r="1.5"/>
    <circle cx="700"  cy="862" r="2.5"/>
    <circle cx="820"  cy="844" r="1.5"/>
    <circle cx="962"  cy="858" r="2"/>
    <circle cx="1102" cy="840" r="1.5"/>
    <circle cx="1198" cy="856" r="2"/>
    <!-- left edge -->
    <circle cx="32"   cy="192" r="1.5"/>
    <circle cx="44"   cy="558" r="2"/>
    <!-- right edge -->
    <circle cx="1412" cy="208" r="1.5"/>
    <circle cx="1424" cy="618" r="2"/>
    <!-- middle scatter — very sparse so as not to clutter the card area -->
    <circle cx="355"  cy="285" r="1.5"/>
    <circle cx="490"  cy="322" r="2"/>
    <circle cx="860"  cy="272" r="1.5"/>
    <circle cx="1038" cy="312" r="2"/>
    <circle cx="358"  cy="588" r="1.5"/>
    <circle cx="498"  cy="618" r="2"/>
    <circle cx="942"  cy="575" r="1.5"/>
    <circle cx="1092" cy="608" r="2"/>
    <circle cx="678"  cy="195" r="1.5"/>
    <circle cx="762"  cy="702" r="1.5"/>
  </g>
</svg>
